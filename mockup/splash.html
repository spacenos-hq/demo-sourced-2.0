  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    .splash {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 28px 36px;
      padding-top: max(48px, env(safe-area-inset-top, 0px));
      padding-bottom: max(36px, env(safe-area-inset-bottom, 0px));
      position: relative;
      background: var(--black);
    }

    .splash__noise {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .splash__grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(16, 185, 129, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16, 185, 129, 0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 75% 65% at 50% 42%, black 20%, transparent 72%);
      pointer-events: none;
    }

    .splash__glow {
      position: absolute;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: 140%;
      max-width: 520px;
      aspect-ratio: 1;
      background: radial-gradient(circle, var(--ux-green-glow) 0%, transparent 62%);
      pointer-events: none;
      animation: splashGlow 10s ease-in-out infinite;
    }

    @keyframes splashGlow {
      0%, 100% { opacity: 0.85; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
    }

    .splash__content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: splashEnter 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
      transform: translateY(12px);
    }

    @keyframes splashEnter {
      to { opacity: 1; transform: translateY(0); }
    }

    .splash__mark {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      background: linear-gradient(145deg, var(--surface2), var(--surface));
      border: 1px solid var(--ux-green-border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.12), 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    .splash__mark-letter {
      font-family: var(--font-serif);
      font-weight: 700;
      font-size: 2.75rem;
      color: var(--ux-green);
    }

    .splash__tagline {
      font-family: var(--font-sans);
      font-size: 17px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--mist2);
      max-width: 280px;
      margin: 0;
    }

    .splash__dibbs {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mist);
      margin-top: 24px;
    }

    @media (prefers-reduced-motion: reduce) {
      .splash__content { opacity: 1; transform: none; animation: none; }
      .splash__glow { animation: none; opacity: 0.9; }
    }
  </style>
</head>
