<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Sourced — Secure account (mockup)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/catalog-shell.css" />
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/flows.css" />
</head>
<body class="catalog-body">
  <div id="doc-progress" aria-hidden="true"></div>
  <div class="catalog-shell catalog-shell--mockup">
    <div class="catalog-noise" aria-hidden="true"></div>
    <div class="catalog-grid" aria-hidden="true"></div>
    <header class="catalog-top catalog-top--compact">
      <div class="catalog-inner catalog-mockup-bar">
        <nav class="catalog-doc-switch" aria-label="Site navigation">
          <a class="catalog-doc-link" href="../index.html">Overview</a>
          <a class="catalog-doc-link" href="index.html">Screen map</a>
          <a class="catalog-doc-link" href="../site/pitch.html">Pitch</a>
          <a class="catalog-doc-link" href="../site/demand.html">Validation</a>
          <a class="catalog-doc-link" href="../site/plansheet.html">Spec</a>
          <a class="catalog-doc-link" href="../reference/index.html">Reference</a>
        </nav>
        <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle light or dark theme">Theme</button>
      </div>
    </header>
    <main class="catalog-main catalog-main--mockup">
      <div class="mockup-page mockup-page--in-shell">
  <p class="mockup-label">Prompt 3 · Step 2 of 2 · Password</p>

  <div class="device" aria-label="Phone frame">
    <div class="device__inner">
      <div class="device__notch" aria-hidden="true"></div>
      <div class="device__screen device__screen--design-rules">
        <div class="flow-screen">
          <div class="screen__status" style="display:flex;justify-content:space-between;padding:10px 20px 0;padding-top:max(10px,env(safe-area-inset-top));font-family:var(--font-mono);font-size:11px;color:var(--heading)">
            <span>9:41</span><span>●●●</span>
          </div>
          <header class="app-header">
            <a class="app-header__back" href="signup-contractor.html" aria-label="Back">←</a>
            <div class="app-header__mid">
              <p class="app-header__title">Secure your account</p>
            </div>
            <div class="app-header__step">Step 2<br /><span style="color:var(--mist2)">of 2</span></div>
          </header>

          <div class="flow-screen__scroll">
            <div class="field">
              <label class="field__label" for="pw">Create a password</label>
              <div class="field__input-wrap">
                <input class="field__input" id="pw" type="password" autocomplete="new-password" style="padding-right:44px" />
                <button type="button" class="flow-topbar__btn" id="togglePw" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:12px" aria-label="Show password">Show</button>
              </div>
              <div class="pw-strength" aria-hidden="true">
                <i id="s0"></i><i id="s1"></i><i id="s2"></i><i id="s3"></i>
              </div>
              <p class="pw-req" id="reqLine">
                <span id="r-len">8+ chars</span> · <span id="r-num">1 number</span> · <span id="r-spec">1 special</span>
              </p>
            </div>
          </div>

          <div class="app-actions">
            <button type="button" class="btn btn--primary btn--disabled" id="createBtn" style="border:none;width:100%">Create Account</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <nav class="flow-strip" aria-label="Mockup flow navigation">
    <a class="flow-strip__btn" href="signup-contractor.html">← Step 1</a>
    <div class="flow-strip__step"><span class="flow-strip__index">Password</span>Wizard next</div>
    <a class="flow-strip__btn flow-strip__btn--primary" href="wizard-welcome.html">Welcome →</a>
  </nav>
  <p class="catalog-link"><a href="index.html">All screens &amp; flow</a></p>
      </div>
    </main>
    <footer class="doc-footer">
      <div class="doc-footer-logo">Sourced · Dibbs 2.0</div>
      <div class="doc-footer-note">Mobile mockup · <a href="index.html">Screen map</a></div>
    </footer>
  </div>
  <script src="js/catalog-shell.js"></script>
  <script src="js/mockup-route-inits.js"></script>
  <script>
  document.addEventListener("DOMContentLoaded", function () {
    MockupRouteInits.runStandalone("signup-contractor-2");
  });
  </script>
</body>
</html>
